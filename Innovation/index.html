<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SecureDB | Real-time Anomaly Detection</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'sans-serif'] },
                    colors: {
                        cyber: {
                            dark: '#0f172a', panel: '#1e293b', accent: '#38bdf8',
                            danger: '#ef4444', success: '#22c55e', warning: '#eab308'
                        }
                    },
                    animation: { 'pulse-slow': 'pulse 3s cubic-bezier(0.4, 0, 0.6, 1) infinite' }
                }
            }
        }
    </script>
    <style>
        body { background-color: #0f172a; color: #f8fafc; }
        .glass-panel { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .grid-bg { background-image: radial-gradient(rgba(56, 189, 248, 0.1) 1px, transparent 1px); background-size: 30px 30px; }
    </style>
</head>
<body class="font-sans antialiased grid-bg min-h-screen flex flex-col">

    <!-- NAVIGATION -->
    <nav class="fixed w-full z-50 glass-panel border-b border-gray-800">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex items-center justify-between h-16">
                <div class="flex items-center gap-2">
                    <i class="fa-solid fa-shield-halved text-cyber-accent text-2xl"></i>
                    <span class="font-bold text-xl tracking-tight">Secure<span class="text-cyber-accent">DB</span></span>
                </div>
            </div>
        </div>
    </nav>

    <!-- DASHBOARD -->
    <section id="dashboard" class="pt-32 pb-12">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="mb-8 flex justify-between items-end">
                <div>
                    <h2 class="text-3xl font-bold text-white">Security Operations Center</h2>
                    <p class="text-gray-400 mt-1">Live feed from PL/SQL Autonomous Logs</p>
                </div>
                <div class="flex items-center gap-2">
                    <span class="relative flex h-3 w-3">
                      <span id="system-status-indicator" class="absolute inline-flex h-full w-full rounded-full bg-gray-400 opacity-75"></span>
                      <span id="system-status-dot" class="relative inline-flex rounded-full h-3 w-3 bg-gray-500"></span>
                    </span>
                    <span id="system-status-text" class="text-sm font-mono text-gray-400">INITIALIZING...</span>
                </div>
            </div>

            <!-- KPI Grid -->
            <div class="grid grid-cols-1 md:grid-cols-4 gap-6 mb-8">
                <div class="glass-panel p-6 rounded-xl border-t-4 border-cyber-accent">
                    <div class="text-sm text-gray-400 uppercase font-bold">Total Connections</div>
                    <div class="text-4xl font-bold text-white mt-2 font-mono" id="kpi-connections">--</div>
                </div>
                <div class="glass-panel p-6 rounded-xl border-t-4 border-cyber-danger">
                    <div class="text-sm text-gray-400 uppercase font-bold">Threats Blocked</div>
                    <div class="text-4xl font-bold text-white mt-2 font-mono" id="kpi-blocked">--</div>
                </div>
                <div class="glass-panel p-6 rounded-xl border-t-4 border-cyber-warning">
                    <div class="text-sm text-gray-400 uppercase font-bold">Suspicious IPs</div>
                    <div class="text-4xl font-bold text-white mt-2 font-mono" id="kpi-suspicious">--</div>
                </div>
                <div class="glass-panel p-6 rounded-xl border-t-4 border-cyber-success">
                    <div class="text-sm text-gray-400 uppercase font-bold">System Health</div>
                    <div class="text-4xl font-bold text-white mt-2 font-mono" id="kpi-health">--%</div>
                </div>
            </div>

            <!-- Live Log Table -->
            <div class="glass-panel rounded-xl overflow-hidden">
                <div class="px-6 py-4 border-b border-gray-700 bg-gray-900/50">
                    <h3 class="font-bold text-lg">Real-Time Access Logs</h3>
                </div>
                <div class="overflow-x-auto">
                    <table class="w-full text-left border-collapse">
                        <thead>
                            <tr class="text-gray-400 text-xs uppercase bg-gray-800/50">
                                <th class="px-6 py-3">Timestamp</th>
                                <th class="px-6 py-3">User</th>
                                <th class="px-6 py-3">IP Address</th>
                                <th class="px-6 py-3">Operation</th>
                                <th class="px-6 py-3">Status</th>
                            </tr>
                        </thead>
                        <tbody id="log-table-body" class="text-sm font-mono">
                            <tr><td colspan="5" class="px-6 py-4 text-center">Waiting for database connection...</td></tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </section>

    <!-- LOGIC SCRIPT -->
    <script>
        // PYTHON API URL
        const API_URL = 'http://localhost:5000/api/stats';

        function updateDashboard(data) {
            // 1. Update Status: ONLINE
            const statusText = document.getElementById('system-status-text');
            const statusDot = document.getElementById('system-status-dot');
            const statusIndicator = document.getElementById('system-status-indicator');

            statusText.innerText = "SYSTEM ONLINE";
            statusText.className = "text-sm font-mono text-green-400";
            statusDot.className = "relative inline-flex rounded-full h-3 w-3 bg-green-500";
            statusIndicator.className = "animate-ping absolute inline-flex h-full w-full rounded-full bg-green-400 opacity-75";
            statusIndicator.classList.remove("hidden");

            // 2. Update KPIs
            document.getElementById('kpi-connections').innerText = data.kpi.total_connections.toLocaleString();
            document.getElementById('kpi-blocked').innerText = data.kpi.threats_blocked.toLocaleString();
            document.getElementById('kpi-suspicious').innerText = data.kpi.suspicious_ips.toLocaleString();
            document.getElementById('kpi-health').innerText = data.kpi.system_health + "%";

            // 3. Update Table
            const tableBody = document.getElementById('log-table-body');
            tableBody.innerHTML = ''; 

            if(data.logs.length === 0) {
                tableBody.innerHTML = '<tr><td colspan="5" class="px-6 py-4 text-center text-gray-500">No logs found in database.</td></tr>';
                return;
            }

            data.logs.forEach(log => {
                const row = document.createElement('tr');
                row.className = "border-b border-gray-800 hover:bg-gray-800/50 transition";
                
                let statusHtml = '';
                const s = log.status.toUpperCase();
                if (s.includes('BLOCK') || s.includes('FAIL') || s.includes('DENIED')) {
                    statusHtml = '<span class="px-2 py-1 rounded text-xs font-bold bg-red-500/10 text-red-500 border border-red-500/20">BLOCKED</span>';
                } else if (s.includes('SUCCESS') || s.includes('AUTHORIZED')) {
                    statusHtml = '<span class="px-2 py-1 rounded text-xs font-bold bg-green-500/10 text-green-500 border border-green-500/20">SUCCESS</span>';
                } else {
                    statusHtml = `<span class="px-2 py-1 rounded text-xs font-bold bg-gray-500/10 text-gray-400 border border-gray-500/20">${log.status}</span>`;
                }

                row.innerHTML = `
                    <td class="px-6 py-4 text-gray-400">${log.time}</td>
                    <td class="px-6 py-4 font-bold text-white">${log.user}</td>
                    <td class="px-6 py-4 text-gray-300">${log.ip}</td>
                    <td class="px-6 py-4 text-gray-300">${log.op}</td>
                    <td class="px-6 py-4">${statusHtml}</td>
                `;
                tableBody.appendChild(row);
            });
        }

        function showConnectionError(msg) {
            const statusText = document.getElementById('system-status-text');
            const statusDot = document.getElementById('system-status-dot');
            const statusIndicator = document.getElementById('system-status-indicator');

            statusText.innerText = "CONNECTION FAILED";
            statusText.className = "text-sm font-mono text-red-500";
            statusDot.className = "relative inline-flex rounded-full h-3 w-3 bg-red-600";
            statusIndicator.className = "hidden"; // Stop pulsing

            // Clear KPIs
            document.getElementById('kpi-connections').innerText = "--";
            document.getElementById('kpi-blocked').innerText = "--";
            document.getElementById('kpi-suspicious').innerText = "--";
            document.getElementById('kpi-health').innerText = "--";

            // Show Error in Table
            const tableBody = document.getElementById('log-table-body');
            tableBody.innerHTML = `
                <tr>
                    <td colspan="5" class="px-6 py-8 text-center text-red-400 bg-red-900/10 rounded-lg border border-red-900/20">
                        <div class="flex flex-col items-center justify-center gap-2">
                            <i class="fa-solid fa-triangle-exclamation text-2xl"></i>
                            <span class="font-bold">Database Connection Failed</span>
                            <span class="text-sm opacity-75">${msg}</span>
                            <span class="text-xs text-gray-500 mt-2">Ensure api_server.py is running and Oracle is accessible.</span>
                        </div>
                    </td>
                </tr>
            `;
        }

        async function fetchDashboardData() {
            try {
                const response = await fetch(API_URL);
                if (!response.ok) {
                    throw new Error('API Unreachable');
                }
                const data = await response.json();
                
                if (data.error) {
                    throw new Error(data.error);
                }

                updateDashboard(data);

            } catch (error) {
                console.error('API Error:', error);
                showConnectionError(error.message);
            }
        }

        // Fetch immediately then every 2 seconds
        fetchDashboardData();
        setInterval(fetchDashboardData, 2000);
    </script>
</body>
</html>
